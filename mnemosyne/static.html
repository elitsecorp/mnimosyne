<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemosyne</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #0d1117; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #0f3460; }
        .sidebar-header h2 { font-size: 1.1rem; color: #e94560; margin-bottom: 8px; }
        .new-chat-btn { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #0f3460; background: #16213e; color: #e0e0e0; cursor: pointer; font-size: 0.85rem; }
        .new-chat-btn:hover { background: #1e3a5f; border-color: #e94560; }
        .session-list { flex: 1; overflow-y: auto; padding: 8px; }
        .session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .session-item:hover { background: #16213e; }
        .session-item.active { background: #0f3460; border: 1px solid #e94560; }
        .session-title { font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .session-count { font-size: 0.7rem; color: #888; margin-left: 8px; }
        .session-delete { color: #888; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; border: none; background: none; cursor: pointer; display: none; }
        .session-item:hover .session-delete { display: block; }
        .session-delete:hover { color: #e94560; background: #3d0000; }
        .main { flex: 1; display: flex; flex-direction: column; }
        header { background: #16213e; padding: 12px 24px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.3rem; color: #e94560; }
        nav a { color: #888; text-decoration: none; margin-left: 16px; font-size: 0.9rem; padding: 6px 12px; border-radius: 6px; }
        nav a:hover, nav a.active { color: #e0e0e0; background: #0f3460; }
        #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 75%; padding: 14px 18px; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; }
        .msg.user { align-self: flex-end; background: #0f3460; color: #fff; }
        .msg.assistant { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; }
        .msg.error { align-self: center; background: #3d0000; border: 1px solid #e94560; color: #e94560; font-size: 0.85rem; }
        .msg.assistant h2, .msg.assistant h3 { color: #e94560; margin: 12px 0 6px 0; font-size: 1rem; }
        .msg.assistant h2:first-child, .msg.assistant h3:first-child { margin-top: 0; }
        .msg.assistant p { margin: 6px 0; }
        .msg.assistant ul, .msg.assistant ol { margin: 6px 0; padding-left: 20px; }
        .msg.assistant li { margin: 3px 0; }
        .msg.assistant strong { color: #fff; }
        .msg.assistant em { color: #aaa; }
        .msg.assistant code { background: #0f3460; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; color: #53a8ff; }
        .msg.assistant pre { background: #0f3460; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .msg.assistant pre code { background: none; padding: 0; }
        .msg.assistant blockquote { border-left: 3px solid #e94560; padding-left: 12px; margin: 8px 0; color: #aaa; }
        .msg.assistant hr { border: none; border-top: 1px solid #0f3460; margin: 10px 0; }
        .pipeline-toggle { display: inline-block; margin-top: 8px; padding: 4px 10px; font-size: 0.75rem; color: #888; background: #0f3460; border: none; border-radius: 4px; cursor: pointer; }
        .pipeline-toggle:hover { color: #e0e0e0; background: #1e3a5f; }
        .pipeline-details { display: none; margin-top: 8px; padding: 10px; background: #0d1b2a; border-radius: 6px; font-size: 0.8rem; border: 1px solid #0f3460; }
        .pipeline-details.open { display: block; }
        .pipeline-section { margin: 8px 0; }
        .pipeline-section h4 { color: #e94560; font-size: 0.78rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .pipeline-section pre { background: #16213e; padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 0.75rem; color: #aaa; white-space: pre-wrap; word-break: break-word; }
        .pipeline-stat { display: inline-block; margin: 2px 6px 2px 0; padding: 2px 6px; background: #16213e; border-radius: 3px; color: #888; }
        .pipeline-stat strong { color: #53a8ff; }
        #input-bar { display: flex; gap: 8px; padding: 16px 24px; background: #16213e; border-top: 1px solid #0f3460; }
        #input-bar input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; font-size: 0.95rem; outline: none; }
        #input-bar input:focus { border-color: #e94560; }
        #input-bar button { padding: 12px 24px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 0.95rem; cursor: pointer; font-weight: 600; }
        #input-bar button:hover { background: #c73650; }
        #input-bar button:disabled { background: #555; cursor: not-allowed; }
        .typing { display: inline-block; }
        .typing::after { content: ''; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Chats</h2>
            <button class="new-chat-btn" onclick="newSession()">+ New Chat</button>
        </div>
        <div class="session-list" id="session-list"></div>
    </div>
    <div class="main">
        <header>
            <h1>Mnemosyne</h1>
            <nav>
                <a href="/" class="active">Chat</a>
                <a href="/memories">Memories</a>
                <a href="/graph-explorer">Graph</a>
                <a href="/importer">Import</a>
                <a href="/consolidate">Consolidate</a>
            </nav>
        </header>
        <div id="messages">
            <div class="msg assistant">Hello! I'm Mnemosyne. I remember our conversations. Ask me anything.</div>
        </div>
        <div id="input-bar">
            <input type="text" id="user-input" placeholder="Type a message..." autofocus>
            <button id="send-btn" onclick="send()">Send</button>
        </div>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let currentSessionId = null;

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) send();
        });

        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();
                const list = document.getElementById('session-list');
                list.innerHTML = sessions.map(s => `
                    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="switchSession(${s.id})">
                        <span class="session-title">${esc(s.title)}</span>
                        <span class="session-count">${s.message_count}</span>
                        <button class="session-delete" onclick="event.stopPropagation(); deleteSession(${s.id})">x</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        async function newSession() {
            currentSessionId = null;
            messagesDiv.innerHTML = '<div class="msg assistant">New chat started. Ask me anything.</div>';
            await loadSessions();
            input.focus();
        }

        async function switchSession(id) {
            currentSessionId = id;
            await loadSessionMessages(id);
            await loadSessions();
        }

        async function loadSessionMessages(id) {
            try {
                const res = await fetch(`/api/sessions/${id}/messages`);
                const messages = await res.json();
                messagesDiv.innerHTML = '';
                messages.forEach(m => {
                    addMsg(m.content, m.role);
                });
            } catch (e) {
                console.error('Failed to load messages:', e);
            }
        }

        async function deleteSession(id) {
            if (!confirm('Delete this chat?')) return;
            try {
                await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
                if (currentSessionId === id) {
                    currentSessionId = null;
                    messagesDiv.innerHTML = '<div class="msg assistant">Chat deleted. Start a new conversation.</div>';
                }
                await loadSessions();
            } catch (e) {
                console.error('Failed to delete session:', e);
            }
        }

        function renderMarkdown(text) {
            let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/^```(\w*)\n([\s\S]*?)```/gm, '<pre><code>$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');
            html = html.replace(/\n{2,}/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[23]>)/g, '$1');
            html = html.replace(/(<\/h[23]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            html = html.replace(/<p>(<hr>)<\/p>/g, '$1');
            return html;
        }

        function buildPipelineHTML(meta) {
            if (!meta) return '';
            const sections = [];
            if (meta.query_plan) {
                const p = meta.query_plan;
                sections.push(`<div class="pipeline-section"><h4>Query Plan</h4><pre>Type: ${esc(p.type)}
Detected entities: ${esc(p.detected_entities.join(', ') || 'none')}
Keywords: ${esc(p.keywords.join(', ') || 'none')}
Max hops: ${p.max_hops}
Graph: ${p.graph_enabled ? 'on' : 'off'} | Vector: ${p.vector_enabled ? 'on' : 'off'}</pre></div>`);
            }
            if (meta.resolved_entities && meta.resolved_entities.length > 0) {
                const rows = meta.resolved_entities.map(e => `  - ${esc(e.name)} (${esc(e.type)}, score: ${e.score}, method: ${esc(e.method)})`).join('\n');
                sections.push(`<div class="pipeline-section"><h4>Resolved Entities</h4><pre>${rows}</pre></div>`);
            }
            if (meta.graph_result) {
                const g = meta.graph_result;
                const entCount = (g.entities || []).length;
                const relCount = (g.relationships || []).length;
                const factCount = (g.facts || []).length;
                let rels = (g.relationships || []).slice(0, 8).map(r => `  - ${esc(r.subject)} ${esc(r.predicate)} ${esc(r.object)} (conf: ${r.confidence?.toFixed(2)})`).join('\n');
                if (relCount > 8) rels += `\n  ... and ${relCount - 8} more`;
                sections.push(`<div class="pipeline-section"><h4>Graph Results</h4><pre>Entities: ${entCount} | Relationships: ${relCount} | Facts: ${factCount}
${rels}</pre></div>`);
            }
            if (meta.memory_result && meta.memory_result.memories && meta.memory_result.memories.length > 0) {
                const mems = meta.memory_result.memories.slice(0, 3).map(m => `  - "${esc(m.text?.substring(0, 100))}" (score: ${m.score?.toFixed(3)})`).join('\n');
                sections.push(`<div class="pipeline-section"><h4>Vector Memories</h4><pre>${mems}</pre></div>`);
            }
            if (meta.context_sent) {
                const ctx = meta.context_sent.length > 800 ? meta.context_sent.substring(0, 800) + '...' : meta.context_sent;
                sections.push(`<div class="pipeline-section"><h4>Context Sent to LLM</h4><pre>${esc(ctx)}</pre></div>`);
            }
            if (meta.extraction) {
                const e = meta.extraction;
                if (e.entities.length || e.relationships.length || e.facts.length) {
                    let lines = [];
                    if (e.entities.length) lines.push(`Entities: ${e.entities.map(x => esc(x.name)).join(', ')}`);
                    if (e.relationships.length) lines.push(`Relationships: ${e.relationships.map(x => `${esc(x.subject)} ${esc(x.predicate)} ${esc(x.object)}`).join('; ')}`);
                    if (e.facts.length) lines.push(`Facts: ${e.facts.map(x => `${esc(x.subject)} ${esc(x.predicate)} ${esc(x.object)}`).join('; ')}`);
                    sections.push(`<div class="pipeline-section"><h4>Extracted Knowledge</h4><pre>${lines.join('\n')}</pre></div>`);
                }
            }
            if (meta.stats) {
                const s = meta.stats;
                const stats = [
                    `<span class="pipeline-stat">Resolved: <strong>${s.resolved_entities}</strong></span>`,
                    `<span class="pipeline-stat">Graph items: <strong>${s.graph_items}</strong></span>`,
                    `<span class="pipeline-stat">Memories: <strong>${s.memory_items}</strong></span>`,
                    `<span class="pipeline-stat">After dedup: <strong>${s.after_dedup}</strong></span>`,
                    `<span class="pipeline-stat">After compress: <strong>${s.after_compress}</strong></span>`,
                    `<span class="pipeline-stat">Context: <strong>${s.context_chars}</strong> chars</span>`,
                    `<span class="pipeline-stat">Time: <strong>${s.elapsed_ms}ms</strong></span>`,
                ];
                sections.push(`<div class="pipeline-section"><h4>Stats</h4><div>${stats.join('')}</div></div>`);
            }
            if (sections.length === 0) return '';
            const id = 'pipe-' + Math.random().toString(36).substr(2, 6);
            return `<button class="pipeline-toggle" onclick="document.getElementById('${id}').classList.toggle('open')">Show pipeline details</button>
                <div class="pipeline-details" id="${id}">${sections.join('')}</div>`;
        }

        function addMsg(text, cls, pipeline) {
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            if (cls === 'assistant') {
                let html = renderMarkdown(text);
                if (pipeline) html += buildPipelineHTML(pipeline);
                div.innerHTML = html;
            } else {
                div.textContent = text;
            }
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            input.value = '';
            sendBtn.disabled = true;
            const typing = addMsg('Thinking...', 'assistant');
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: currentSessionId })
                });
                const data = await res.json();
                typing.remove();
                if (res.ok) {
                    addMsg(data.response, 'assistant', data.pipeline);
                    if (data.session_id && data.session_id !== currentSessionId) {
                        currentSessionId = data.session_id;
                        await loadSessions();
                    } else {
                        await loadSessions();
                    }
                } else {
                    addMsg(data.detail || 'Error occurred', 'error');
                }
            } catch (err) {
                typing.remove();
                addMsg('Network error: ' + err.message, 'error');
            }
            sendBtn.disabled = false;
            input.focus();
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        loadSessions();
    </script>
</body>
</html>
